<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortfolioHUB - Gerenciador de Projetos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #24292e; border-bottom: 2px solid #eaecef; padding-bottom: 10px; }
        .project-card { border: 1px solid #e1e4e8; border-radius: 6px; padding: 15px; margin: 15px 0; background: #fafbfc; }
        .tag { background: #dbedff; color: #0366d6; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 PortfolioHUB</h1>
        <p>Plataforma integrada ao ecossistema GitHub para exibição de projetos digitais.</p>
        
        <div class="project-card">
            <h3>📂 Projeto Atual: atividade2</h3>
            <p>Repositório de implantação monitorado e validado via inteligência artificial.</p>
            <span class="tag">#portfoliohub</span>
            <span class="tag">Gemini-Approved</span>
            <p>Status de Conexão: <span class="status">● Online</span></p>
        </div>
    </div>
</body>
</html>
